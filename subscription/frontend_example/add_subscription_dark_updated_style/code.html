<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Subscription</title>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-glass {
            background-color: rgba(30, 32, 33, 0.7);
            backdrop-filter: blur(24px);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #45E17C 0%, #07C160 100%);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body min-h-screen">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-[#121415]/70 backdrop-blur-3xl">
<div class="flex justify-between items-center px-6 py-4 w-full">
<h1 class="font-headline font-bold text-lg tracking-tight text-[#E2E2E3]">Add Subscription</h1>
<button class="text-primary font-medium hover:opacity-80 transition-opacity active:scale-95">Cancel</button>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto">
<form class="space-y-10">
<!-- Service Selection Section -->
<section class="space-y-4">
<div class="relative">
<label class="block text-on-surface-variant text-[0.75rem] font-medium mb-2 uppercase tracking-widest px-1" for="service-search">Service Provider</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant" data-icon="search">search</span>
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 pl-12 pr-4 focus:ring-1 focus:ring-primary/40 focus:bg-surface-container transition-all text-on-surface placeholder:text-on-surface-variant/50" id="service-search" placeholder="What are you paying for?" type="text"/>
</div>
</div>
<!-- Quick Select Chips -->
<div class="flex gap-2 pt-2">
<div class="flex justify-between w-full pt-4">
<!-- Netflix -->
<button class="flex flex-col items-center gap-3 group" type="button">
<div class="w-14 h-14 bg-white rounded-xl flex items-center justify-center shadow-lg transition-transform active:scale-95">
<span class="text-[#E50914] font-black text-xs tracking-tighter">NETFLIX</span>
</div>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Netflix</span>
</button>
<!-- Spotify -->
<button class="flex flex-col items-center gap-3 group" type="button">
<div class="w-14 h-14 bg-white rounded-xl flex items-center justify-center shadow-lg transition-transform active:scale-95">
<svg class="w-8 h-8 text-[#1ED760]" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 0C5.372 0 0 5.372 0 12s5.372 12 12 12 12-5.372 12-12S18.628 0 12 0zm5.503 17.306c-.215.352-.676.463-1.028.248-2.824-1.725-6.377-2.116-10.563-1.16-.403.093-.807-.158-.899-.561-.092-.403.159-.807.561-.899 4.587-1.048 8.514-.601 11.681 1.336.353.214.464.676.248 1.036zm1.47-3.262c-.271.44-.844.577-1.284.306-3.232-1.986-8.159-2.564-11.982-1.403-.497.151-1.024-.131-1.175-.628s.131-1.024.628-1.175c4.372-1.328 9.802-.676 13.523 1.614.441.27.577.844.306 1.286zm.126-3.388c-3.877-2.302-10.279-2.515-13.987-1.389-.594.181-1.23-.153-1.41-0.748s.152-1.23.748-1.41c4.274-1.298 11.33-1.048 15.8 1.607.534.317.708 1.008.391 1.543-.317.535-1.007.71-1.542.397z"></path>
</svg>
</div>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Spotify</span>
</button>
<!-- YouTube -->
<button class="flex flex-col items-center gap-3 group" type="button">
<div class="w-14 h-14 bg-[#282828] rounded-xl flex items-center justify-center shadow-lg transition-transform active:scale-95">
<svg class="w-7 h-7 text-[#FF0000]" fill="currentColor" viewbox="0 0 24 24">
<path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"></path>
</svg>
</div>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">YouTube</span>
</button>
<!-- iCloud -->
<button class="flex flex-col items-center gap-3 group" type="button">
<div class="w-14 h-14 bg-white rounded-xl flex items-center justify-center shadow-lg transition-transform active:scale-95">
<div class="w-8 h-8 bg-gradient-to-b from-[#47B6F3] to-[#007AFF] rounded-full blur-[0.5px] relative overflow-hidden">
<div class="absolute inset-0 bg-white/20 blur-sm scale-150 -translate-y-2"></div>
</div>
</div>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">iCloud</span>
</button>
<!-- Other -->
<button class="flex flex-col items-center gap-3 group" type="button">
<div class="w-14 h-14 bg-surface-container-high rounded-xl flex items-center justify-center border-2 border-dashed border-outline-variant/30 transition-transform active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="add">add</span>
</div>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Other</span>
</button>
</div></div>
</section>
<!-- Cost and Cycle Bento Layout -->
<section class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block text-on-surface-variant text-[0.75rem] font-medium uppercase tracking-widest px-1" for="cost-input">Amount</label>
<div class="relative flex items-center">
<span class="absolute left-4 text-primary font-bold">¥</span>
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 pl-8 pr-4 focus:ring-1 focus:ring-primary/40 focus:bg-surface-container transition-all text-on-surface font-headline font-bold text-xl" id="cost-input" placeholder="0.00" type="number"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-on-surface-variant text-[0.75rem] font-medium uppercase tracking-widest px-1" for="cycle-select">Billing Cycle</label>
<div class="relative">
<select class="w-full bg-surface-container-lowest border-none rounded-xl py-4.5 pl-4 pr-10 focus:ring-1 focus:ring-primary/40 focus:bg-surface-container transition-all text-on-surface appearance-none font-medium h-[60px]" id="cycle-select">
<option>Monthly</option>
<option>Weekly</option>
<option>Quarterly</option>
<option>Yearly</option>
<option>Lifetime</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant" data-icon="expand_more">expand_more</span>
</div>
</div>
</section>
<!-- Date Picker and Reminder -->
<section class="space-y-6">
<div class="bg-surface-container-low p-1 rounded-xl">
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-lg">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
</div>
<div>
<p class="text-xs text-on-surface-variant font-medium uppercase tracking-wider">Next Billing Date</p>
<input class="bg-transparent border-none p-0 text-on-surface font-bold focus:ring-0" type="date" value="2024-05-20"/>
</div>
</div>
</div>
</div>
<div class="flex items-center justify-between px-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="notifications">notifications</span>
<div>
<p class="text-sm font-semibold text-on-surface">Payment Reminder</p>
<p class="text-xs text-on-surface-variant">Notify me 2 days before</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
</section>
<!-- Visualization / Insight -->
<div class="relative overflow-hidden rounded-2xl aspect-[16/6] flex items-center px-8">
<div class="absolute inset-0 z-0 bg-surface-container">
<img class="w-full h-full object-cover opacity-20 mix-blend-luminosity" data-alt="abstract flowing waves of soft green and charcoal light with subtle grain and motion blur" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCSxC70YuORC96uhpv9H6h5GT9R2DRlk6wtAJU_8NxCkfG9VNgUIodZJSNXqjRVSoDrmIcBvEdwAVPwH7_bNjUSf1QVxlgY2oYWV5MSUmwCVnMDq7xLlTqHEJajKkf4rniSevdV626nIK-jQWbPJZMa3vYf162a5CaQ4-L0e7KiIHj4fye8JRGiwJxU82J7DIdi5heCAjoGh4FC8cCJ2IwMQyxI3xJ5r5vEspWfP8yBts1vxodKWn3eEifdooH4i69jQtIA_2RZ6jwa"/>
</div>
<div class="relative z-10 flex flex-col">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-primary mb-1">Annual Impact</span>
<span class="text-2xl font-headline font-extrabold text-on-surface">¥1,248.00 / year</span>
</div>
<div class="absolute right-8 top-1/2 -translate-y-1/2 flex items-center justify-center w-12 h-12 rounded-full border border-primary/20">
<span class="material-symbols-outlined text-primary" data-icon="trending_up">trending_up</span>
</div>
</div>
</form>
</main>
<!-- Fixed Primary Action -->
<div class="fixed bottom-0 left-0 w-full p-6 pb-10 bg-gradient-to-t from-surface via-surface/90 to-transparent">
<button class="w-full primary-gradient text-on-primary font-headline font-extrabold text-lg py-4 rounded-xl shadow-[0_4px_40px_rgba(69,225,124,0.15)] active:scale-95 transition-transform">
            Save Subscription
        </button>
</div>
</body></html>
